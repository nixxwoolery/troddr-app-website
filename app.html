<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get TRODDR</title>
    <meta
      name="description"
      content="Download TRODDR on the App Store or Google Play."
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 20px 50px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        object-fit: cover;
        margin: 0 auto 18px;
        display: block;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 16px;
        line-height: 1.6;
      }

      .status {
        margin-top: 16px;
        font-size: 14px;
        color: #6b7280;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 50px;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button-primary {
        background: #0077cc;
        color: #ffffff;
      }

      .button-secondary {
        background: #eef2f7;
        color: #0077cc;
      }

      .note {
        margin-top: 18px;
        font-size: 13px;
        color: #9ca3af;
      }
    </style>
    <script>
      (function () {
        var APP_STORE_URL = 'https://apps.apple.com/app/troddr/id6751852075';
        var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.troddr.app';

        var ua = navigator.userAgent || navigator.vendor || window.opera || '';
        var isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        var isAndroid = /Android/i.test(ua);

        var targetUrl = isIOS ? APP_STORE_URL : isAndroid ? PLAY_STORE_URL : '';

        window.addEventListener('DOMContentLoaded', function () {
          var statusEl = document.getElementById('redirect-status');
          if (statusEl) {
            if (isIOS) {
              statusEl.textContent = 'Redirecting to the App Store…';
            } else if (isAndroid) {
              statusEl.textContent = 'Redirecting to Google Play…';
            } else {
              statusEl.textContent = 'Choose your store below.';
            }
          }

          if (targetUrl) {
            window.setTimeout(function () {
              window.location.replace(targetUrl);
            }, 250);
          }
        });
      })();
    </script>
  </head>
  <body>
    <main class="card">
      <!-- <img
        class="logo"
        src="/TRODDR APP LOGO.png"
        alt="TRODDR logo"
      /> -->
      <h1>Get the TRODDR app</h1>
      <p>
        Discover where to eat, stay, and explore across Jamaica. <br>If you are not redirected automatically,
        choose your store below.
      </p>
      <div id="redirect-status" class="status">Checking your device…</div>

      <div class="buttons">
        <a
          class="button button-primary"
          href="https://apps.apple.com/app/troddr/id6751852075"
        >
          Download on the App Store
        </a>
        <a
          class="button button-secondary"
          href="https://play.google.com/store/apps/details?id=com.troddr.app"
        >
          Get it on Google Play
        </a>
      </div>

      <div class="note">
        Works best from your phone.
      </div>
    </main>
  </body>
</html>
