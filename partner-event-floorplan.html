<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRODDR · Floor Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/partner-shared.css">
<link rel="stylesheet" href="/css/floorplan-builder.css?v=4">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Pan/zoom for the canvas. ~5KB gzipped, touch-ready. -->
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
<script src="/js/troddr-config.js"></script>
<script src="/js/partner-auth.js"></script>
<script src="/js/partner-sidebar.js"></script>
<script src="/js/partner-errors.js"></script>
<script src="/js/floorplan-builder.js?v=4"></script>

<script>
  const SUPABASE_URL  = (window.__ENV__ && window.__ENV__.SUPABASE_URL)  || (window.location.origin + '/api/sb');
  const SUPABASE_ANON = (window.__ENV__ && window.__ENV__.SUPABASE_ANON) || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcnB3dWRocGxvZGFxbW13cWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAyODcyODksImV4cCI6MjA2NTg2MzI4OX0.lNL6YZQqZgbsQRJyRAXpaWMC4LxncvPPyXNP1qopTFk';
</script>

<style>
  :root {
    --black: #111; --grey-dark: #333; --grey-mid: #666; --grey-light: #999;
    --border: #e8e8e8; --border-soft: #f0f0f0;
    --bg: #fff; --bg-soft: #f8f9fa;
    --radius: 10px; --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --brand-primary: #111;
    --brand-accent: #C3D600;
    --brand-text: #fff;
    --blue: #0a7aff;
    --red: #c0392b; --green: #1a7f4e; --amber: #b86e00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-soft);
    color: var(--black);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 200;
    background: #fff;
    border-bottom: 1px solid var(--border);
  }
  .navbar {
    max-width: 1280px; margin: 0 auto;
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 24px;
  }
  .logo {
    font-size: 26px; font-weight: 700;
    color: var(--blue); text-decoration: none;
    letter-spacing: -1px;
  }
  .nav-badge {
    background: var(--bg-soft);
    color: var(--grey-dark);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  /* ── HERO ── */
  .page-hero {
    background: var(--brand-primary);
    color: var(--brand-text);
    padding: 28px 24px 36px;
    text-align: left;
    position: relative; overflow: hidden;
  }
  .hero-inner {
    position: relative; max-width: 1280px;
    margin: 0 auto;
    padding: 0 8px;
    z-index: 2;
  }
  .hero-eyebrow {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: var(--brand-text);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px;
    margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,0.22);
  }
  .page-hero h1 {
    font-size: clamp(22px, 3.2vw, 30px);
    font-weight: 800; line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.6px;
    max-width: 760px;
  }
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 8px 18px;
    color: rgba(255,255,255,0.92);
    font-size: 13px; font-weight: 500;
  }

  /* ── LAYOUT ── */
  .layout {
    max-width: 1380px;
    margin: 0 auto;
    padding: 14px 18px 0;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 16px;
    position: relative; z-index: 10;
  }
  .main {
    min-width: 0;
    padding-bottom: 80px;
  }
  .sidebar {
    position: sticky; top: 76px;
    align-self: start;
    height: max-content;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px;
    box-shadow: var(--shadow-sm);
  }
  .sidebar-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--grey-light);
    padding: 10px 12px 8px;
  }
  .sidebar a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    color: var(--grey-dark);
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar a:hover { background: var(--bg-soft); color: var(--black); }
  .sidebar a.active {
    background: var(--brand-primary);
    color: var(--brand-text);
    font-weight: 600;
  }
  .sidebar a svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar a.jump-link { font-size: 12px; padding: 7px 12px; color: var(--grey-mid); }
  .sidebar a.jump-link.active {
    background: transparent;
    color: var(--brand-primary);
    font-weight: 700;
  }
  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 8px;
  }

  /* ── STATES ── */
  .state {
    text-align: center; padding: 40px 24px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .state-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .state-msg   { font-size: 14px; color: var(--grey-mid); max-width: 380px; margin: 0 auto; }
  .hidden { display: none !important; }

  /* Skeleton card stand-ins for the loading view. */
  .skeleton-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
  }
  .skeleton {
    display: block;
    background: linear-gradient(90deg, var(--border-soft) 0%, var(--bg-soft) 50%, var(--border-soft) 100%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
    height: 14px;
    margin-bottom: 8px;
  }
  .skeleton-title { height: 22px; margin-bottom: 14px; }
  .skeleton-text.long { width: 90%; }
  @keyframes skeleton-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="navbar">
    <a href="https://www.troddr.com" class="logo">troddr</a>
    <span class="nav-badge">Event Partner</span>
  </div>
</header>

<section class="page-hero">
  <div class="hero-inner">
    <span class="hero-eyebrow" id="hero-eyebrow">Floor Plan</span>
    <h1 id="hero-title">Loading…</h1>
    <div class="hero-meta" id="hero-meta"></div>
  </div>
</section>

<!-- LOADING -->
<div class="layout" id="view-loading">
  <div></div>
  <div class="main">
    <div class="skeleton-card" style="margin-bottom: 14px;">
      <span class="skeleton skeleton-title" style="width: 30%;"></span>
      <span class="skeleton skeleton-text long"></span>
    </div>
    <div class="skeleton-card" style="height: 400px;"></div>
  </div>
</div>

<!-- ERROR -->
<div class="layout hidden" id="view-error">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="state">
      <div class="state-title">We couldn't load this floor plan</div>
      <p class="state-msg">This link may have expired. Try opening the latest dashboard link from TRODDR, or message us if you think this is a mistake.</p>
      <pre id="error-detail" style="margin-top:18px; padding:10px 14px; background:var(--bg-soft); border:1px solid var(--border); border-radius:8px; font-size:11px; color:var(--grey-mid); text-align:left; max-width:560px; margin-left:auto; margin-right:auto; white-space:pre-wrap; overflow:auto;"></pre>
    </div>
  </div>
</div>

<!-- EDITOR -->
<div class="layout hidden" id="view-editor">
  <aside class="sidebar"></aside>
  <main class="main">
    <div id="builder-root"></div>
  </main>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);
  const $ = (id) => document.getElementById(id);

  let builder = null;
  let eventSlug = null;
  let eventId = null;

  function getToken() {
    return window.PartnerAuth?.getToken() || new URLSearchParams(location.search).get('token') || '';
  }

  // ── Storage upload for the venue background image ──────────
  async function uploadBackground(file) {
    const ext  = (file.name.split('.').pop() || 'png').toLowerCase();
    const slug = eventSlug || eventId || 'event';
    const path = `${slug}/floor-plan-${Date.now()}.${ext}`;
    const { data, error } = await db.storage.from('event-floorplans').upload(path, file, {
      upsert: true, contentType: file.type,
    });
    if (error) {
      const msg = (error.message || error.error || 'Upload failed.');
      const blocked = /not found|policy/i.test(String(msg))
        ? ' (Make sure the "event-floorplans" bucket exists in Supabase Storage with the right policies.)'
        : '';
      throw new Error(msg + blocked);
    }
    const { data: pub } = db.storage.from('event-floorplans').getPublicUrl(data.path);
    return pub.publicUrl;
  }

  // ── Save ───────────────────────────────────────────────────
  async function saveFloorPlan({ backgroundUrl, elements }) {
    const { data, error } = await db.rpc('update_event_floor_plan', {
      p_token: getToken(),
      p_floor_plan_url: backgroundUrl,
      p_floor_plan_markers: elements,
    });
    if (error || !data || !data.ok) {
      return { ok: false, error: (error && (error.message || error.code)) || (data && data.error) || 'Save failed' };
    }
    return { ok: true };
  }

  // ── Designer invite ────────────────────────────────────────
  async function createInvite() {
    try {
      const { data, error } = await db.rpc('create_event_map_invite', {
        p_token:          getToken(),
        p_designer_name:  null,
        p_designer_email: null,
        p_scopes:         ['markers'],
        p_expires_in_days: 14,
      });
      if (error || !data || !data.token) {
        alert((error && error.message) || (data && data.error) || 'Could not create invite.');
        return;
      }
      const url = `${location.origin}/m/${data.token}`;
      navigator.clipboard?.writeText(url).catch(() => {});
      alert('Designer link copied to clipboard:\n\n' + url + '\n\nValid for 14 days. The designer gets the same builder, limited to this event\'s layout.');
    } catch (err) { alert((err && err.message) || 'Network error.'); }
  }

  // ── Public attendee link ───────────────────────────────────
  function copyPublicLink() {
    if (!eventSlug) { alert('This event has no public link yet.'); return; }
    const url = `${location.origin}/map/${eventSlug}`;
    navigator.clipboard?.writeText(url).catch(() => {});
    alert('Public map link copied to clipboard:\n\n' + url + '\n\nGuests can open it on any phone — no app or login needed. Remember to Save so the link shows your latest layout.');
  }

  // ── Sidebar mount ──────────────────────────────────────────
  function setupSidebar(capabilities, opts) {
    opts = opts || {};
    window.PartnerSidebar?.mount({
      active: '/partner/event-floorplan',
      capabilities,
      partner: opts.partner,
      jumpLinks: [
        { section: 'builder-root', icon: 'ic-floorplan', label: 'Floor Plan' },
      ],
    });
  }

  // ── Bootstrap ──────────────────────────────────────────────
  function showLoadError(error) {
    const detail = (error && (error.message || error.code || error.details || error.hint)) || (typeof error === 'string' ? error : '');
    $('error-detail').textContent = detail || '';
    $('view-loading').classList.add('hidden');
    $('view-error').classList.remove('hidden');
    window.PartnerAuth?.mountSessionControl('partner');
    setupSidebar();
  }

  async function load() {
    const urlParams = new URLSearchParams(location.search);
    const token = window.PartnerAuth?.getToken({ require: false }) || urlParams.get('token') || '';
    if (!token) {
      if (window.PartnerAuth) window.PartnerAuth.getToken({ require: true });
      else showLoadError('Missing token');
      return;
    }

    let eventRes, capsRes;
    try {
      const results = await Promise.allSettled([
        db.rpc('get_partner_event_by_token',        { p_token: token }),
        db.rpc('get_partner_capabilities_by_token', { p_token: token }),
      ]);
      eventRes = results[0].status === 'fulfilled' ? results[0].value : { error: results[0].reason };
      capsRes  = results[1].status === 'fulfilled' ? results[1].value : { error: results[1].reason };
    } catch (err) {
      showLoadError(err);
      return;
    }

    const { data, error } = eventRes;
    if (error || !data || !data.event) {
      showLoadError(error || 'No event');
      return;
    }

    const e = data.event;
    eventId   = e.id;
    eventSlug = e.slug;

    // Hero
    $('hero-title').textContent = e.title || 'Floor Plan';
    $('hero-meta').textContent  = 'Build the site map your guests will see — booths, stages, bars and more.';

    // Reveal editor view BEFORE mounting so the canvas can measure itself.
    $('view-loading').classList.add('hidden');
    $('view-editor').classList.remove('hidden');

    window.PartnerAuth?.mountSessionControl('partner');
    setupSidebar(capsRes && capsRes.data && capsRes.data.capabilities, {
      partner: capsRes && capsRes.data && capsRes.data.partner,
    });

    builder = FloorplanBuilder.mount({
      container: $('builder-root'),
      elements: Array.isArray(e.floor_plan_markers) ? e.floor_plan_markers : [],
      backgroundUrl: e.floor_plan_url || null,
      vendors: Array.isArray(data.vendors) ? data.vendors : [],
      saveLabel: 'Save',
      onSave: saveFloorPlan,
      onUploadBackground: uploadBackground,
      actions: [
        { label: 'Designer link', icon: 'fpb-copy', onClick: createInvite },
        { label: 'Public link', icon: 'fpb-link', onClick: copyPublicLink },
      ],
    });
  }

  document.addEventListener('DOMContentLoaded', load);
</script>

</body>
</html>
