<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRODDR Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="robots" content="noindex,nofollow" />

<script>
  const SUPABASE_URL  = (window.__ENV__ && window.__ENV__.SUPABASE_URL)  || 'https://rprpwudhplodaqmmwqkf.supabase.co';
  const SUPABASE_ANON = (window.__ENV__ && window.__ENV__.SUPABASE_ANON) || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcnB3dWRocGxvZGFxbW13cWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAyODcyODksImV4cCI6MjA2NTg2MzI4OX0.lNL6YZQqZgbsQRJyRAXpaWMC4LxncvPPyXNP1qopTFk';
</script>

<style>
  :root {
    --black:#111; --grey-dark:#333; --grey-mid:#666; --grey-light:#999;
    --border:#e8e8e8; --bg:#fff; --bg-soft:#f8f9fa;
    --primary:#0077CC; --red:#c0392b; --red-light:#fdecea;
    --radius:10px; --radius-lg:16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-soft); color: var(--black);
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .hidden { display: none !important; }

  /* ── Responsive application shell ────────────────────── */
  .app-shell { flex: 1; min-height: 0; display: flex; }
  .sidebar {
    flex: 0 0 240px; width: 240px; min-height: 0;
    display: flex; flex-direction: column;
    background: var(--black); color: #fff;
    border-right: 1px solid #000;
  }
  .brand {
    height: 68px; padding: 0 22px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    display: grid; place-items: center;
    background: var(--primary); color: #fff;
    font-size: 13px; font-weight: 800;
  }
  .brand-copy strong { display: block; font-size: 15px; line-height: 1.2; }
  .brand-copy span { display: block; color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 2px; }
  .section-nav { display: flex; flex: 1; flex-direction: column; gap: 4px; padding: 18px 12px; }
  .section-tab {
    min-height: 44px; padding: 10px 12px;
    display: flex; align-items: center; gap: 12px; width: 100%;
    font-family: inherit; font-size: 13px; font-weight: 600;
    text-align: left;
    color: rgba(255,255,255,0.65);
    background: transparent; border: none;
    border-radius: 8px; cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .section-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .section-tab.active { color: #fff; background: rgba(255,255,255,0.16); }
  .nav-icon { width: 20px; text-align: center; font-size: 15px; line-height: 1; }
  .sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .signout-btn {
    width: 100%; min-height: 42px; padding: 8px 12px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px; cursor: pointer;
  }
  .signout-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

  .workspace { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  .workspace-header {
    flex: 0 0 68px; height: 68px; padding: 0 24px;
    display: flex; align-items: center; gap: 12px;
    background: #fff; border-bottom: 1px solid var(--border);
  }
  .workspace-heading { min-width: 0; }
  .workspace-heading h1 { font-size: 18px; line-height: 1.25; letter-spacing: -0.35px; }
  .workspace-heading p { color: var(--grey-light); font-size: 11px; margin-top: 2px; }
  .workspace-spacer { flex: 1; }
  .icon-btn {
    min-width: 40px; min-height: 40px; padding: 8px 12px;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: 1px solid var(--border); border-radius: 9px;
    background: #fff; color: var(--grey-dark); cursor: pointer;
    font: 600 12px/1 'Poppins', sans-serif;
  }
  .icon-btn:hover { background: var(--bg-soft); border-color: #d9d9d9; }
  .menu-btn { display: none; }
  .drawer-backdrop { display: none; }

  /* ── Section / iframe area ────────────────────────────── */
  #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .frames { flex: 1; min-height: 0; position: relative; }
  .section { position: absolute; inset: 0; display: none; }
  .section.active { display: block; }
  .section iframe { width: 100%; height: 100%; border: none; display: block; background: var(--bg-soft); }

  /* ── Auth gate ────────────────────────────────────────── */
  #gate { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .gate-card {
    width: 100%; max-width: 420px;
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 34px 30px;
    box-shadow: 0 16px 45px rgba(0,0,0,0.08); text-align: center;
  }
  .gate-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.4px; }
  .gate-card p { color: var(--grey-mid); font-size: 14px; margin-bottom: 18px; }
  .gate-card input {
    width: 100%; padding: 11px 14px;
    font-family: inherit; font-size: 14px;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;
  }
  .gate-card button {
    width: 100%; padding: 11px 22px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .gate-error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }
  .gate-error.show { display: block; }

  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--border); border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .sidebar {
      position: fixed; z-index: 1000; inset: 0 auto 0 0;
      width: min(280px, 86vw); transform: translateX(-102%);
      transition: transform 0.2s ease;
      box-shadow: 20px 0 50px rgba(0,0,0,0.25);
    }
    .app-shell.drawer-open .sidebar { transform: translateX(0); }
    .drawer-backdrop {
      position: fixed; z-index: 999; inset: 0;
      display: block; visibility: hidden; opacity: 0;
      background: rgba(0,0,0,0.42); border: 0;
      transition: opacity 0.2s ease, visibility 0.2s;
    }
    .app-shell.drawer-open .drawer-backdrop { visibility: visible; opacity: 1; }
    .menu-btn { display: inline-flex; }
    .workspace-header { height: 60px; flex-basis: 60px; padding: 0 12px; }
    .workspace-heading h1 { font-size: 16px; }
    .workspace-heading p { display: none; }
    .refresh-label { display: none; }
  }
  @media (max-width: 480px) {
    .workspace-header { gap: 8px; }
    .icon-btn { min-width: 40px; padding: 8px 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .sidebar, .drawer-backdrop { transition: none; }
  }
</style>
</head>
<body>

<!-- ── Auth gate ───────────────────────────────────────── -->
<div id="gate" class="hidden">
  <div class="gate-card">
    <h2>Admin sign-in</h2>
    <p>Enter your admin token to access the console.</p>
    <input id="gate-input" type="password" placeholder="Admin token…" autocomplete="one-time-code" />
    <button id="gate-go">Continue</button>
    <div class="gate-error" id="gate-error">Invalid or revoked token.</div>
  </div>
</div>

<!-- ── Loading ─────────────────────────────────────────── -->
<div id="loading" class="hidden" style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--grey-mid);">
  <div class="spinner"></div>
  <p>Verifying token…</p>
</div>

<!-- ── Main application shell ──────────────────────────── -->
<div class="app-shell hidden" id="app-shell">
  <button class="drawer-backdrop" id="drawer-backdrop" aria-label="Close navigation"></button>
  <aside class="sidebar" id="sidebar" aria-label="Admin navigation">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">T</div>
      <div class="brand-copy"><strong>TRODDR</strong><span>Administration</span></div>
    </div>
    <nav class="section-nav" aria-label="Dashboard sections">
      <button class="section-tab active" data-section="overview"><span class="nav-icon" aria-hidden="true">◫</span>Overview</button>
      <button class="section-tab" data-section="analytics"><span class="nav-icon" aria-hidden="true">↗</span>Analytics</button>
      <button class="section-tab" data-section="events"><span class="nav-icon" aria-hidden="true">◇</span>Events</button>
      <button class="section-tab" data-section="feedback"><span class="nav-icon" aria-hidden="true">◎</span>Feedback</button>
      <button class="section-tab" data-section="review"><span class="nav-icon" aria-hidden="true">✓</span>Review</button>
      <button class="section-tab" data-section="billing"><span class="nav-icon" aria-hidden="true">$</span>Billing</button>
      <button class="section-tab" data-section="bookings"><span class="nav-icon" aria-hidden="true">▦</span>Bookings</button>
    </nav>
    <div class="sidebar-footer"><button class="signout-btn" id="signout">Sign out</button></div>
  </aside>

  <div class="workspace">
    <header class="workspace-header">
      <button class="icon-btn menu-btn" id="menu-btn" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
      <div class="workspace-heading">
        <h1 id="section-title">Overview</h1>
        <p id="section-description">Platform health and work requiring attention</p>
      </div>
      <div class="workspace-spacer"></div>
      <button class="icon-btn" id="refresh-section" title="Refresh this section" aria-label="Refresh this section"><span aria-hidden="true">↻</span><span class="refresh-label">Refresh</span></button>
    </header>
    <main id="main">
      <div class="frames">
    <div class="section active" id="sec-overview">
      <iframe data-src="/admin-overview.html" title="Overview"></iframe>
    </div>
    <div class="section" id="sec-analytics">
      <iframe data-src="/admin-analytics.html" title="Analytics"></iframe>
    </div>
    <div class="section" id="sec-events">
      <iframe data-src="/admin-events.html" title="Events console"></iframe>
    </div>
    <div class="section" id="sec-feedback">
      <iframe data-src="/admin-feedback.html" title="Feedback inbox"></iframe>
    </div>
    <div class="section" id="sec-review">
      <iframe data-src="/admin-review.html" title="Review queue"></iframe>
    </div>
    <div class="section" id="sec-billing">
      <iframe data-src="/admin-billing.html" title="Billing console"></iframe>
    </div>
    <div class="section" id="sec-bookings">
      <iframe data-src="/admin-booking-setup.html" title="Booking setup"></iframe>
    </div>
      </div>
    </main>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);
  const $ = (id) => document.getElementById(id);

  let adminToken = '';

  /* ── View helpers ─────────────────────────────────────── */
  function show(view) {
    $('gate').classList.toggle('hidden', view !== 'gate');
    $('loading').classList.toggle('hidden', view !== 'loading');
    $('app-shell').classList.toggle('hidden', view !== 'main');
  }

  /* ── Token storage ────────────────────────────────────── */
  function setToken(t) {
    adminToken = t;
    try { sessionStorage.setItem('troddr_admin_token', t); } catch (e) {}
  }
  function loadStoredToken() {
    const urlT = new URLSearchParams(location.search).get('token');
    if (urlT) { setToken(urlT); return urlT; }
    try { return sessionStorage.getItem('troddr_admin_token') || ''; } catch (e) { return ''; }
  }

  /* ── Sections (lazy-loaded iframes) ───────────────────── */
  const SECTION_META = {
    overview:  { title: 'Overview',  description: 'Platform health and work requiring attention' },
    analytics: { title: 'Analytics', description: 'Usage, discovery and conversion performance' },
    events:    { title: 'Events',    description: 'Event performance, audiences and updates' },
    feedback:  { title: 'Feedback',  description: 'Customer feedback, ratings and product signals' },
    review:    { title: 'Review',    description: 'Submissions and requests awaiting action' },
    billing:   { title: 'Billing',   description: 'Companies, invoices, payments and renewals' },
    bookings:  { title: 'Bookings',  description: 'Property booking configuration and availability' },
  };
  const SECTIONS = Object.keys(SECTION_META);
  let currentSection = 'overview';
  function frameFor(key) { return $('sec-' + key).querySelector('iframe'); }

  function sectionFromRoute() {
    const key = location.hash.replace(/^#\/?/, '').split(/[/?]/)[0];
    return SECTIONS.includes(key) ? key : 'overview';
  }

  function closeDrawer() {
    $('app-shell').classList.remove('drawer-open');
    $('menu-btn').setAttribute('aria-expanded', 'false');
  }

  // Strip the child page's own sticky header so the shell bar is the only chrome.
  function stripChildHeader(iframe) {
    try {
      const doc = iframe.contentDocument;
      if (!doc) return;
      const style = doc.createElement('style');
      style.textContent = 'header.header{display:none!important;}';
      doc.head.appendChild(style);
    } catch (e) { /* cross-origin or not ready — child header just stays visible */ }
  }

  function loadSection(key) {
    const iframe = frameFor(key);
    if (iframe.dataset.loaded) return;
    iframe.dataset.loaded = '1';
    iframe.addEventListener('load', () => stripChildHeader(iframe));
    const sep = iframe.dataset.src.includes('?') ? '&' : '?';
    iframe.src = iframe.dataset.src + sep + 'token=' + encodeURIComponent(adminToken);
  }

  function showSection(key, options = {}) {
    if (!SECTIONS.includes(key)) key = 'overview';
    currentSection = key;
    SECTIONS.forEach((k) => {
      $('sec-' + k).classList.toggle('active', k === key);
    });
    document.querySelectorAll('.section-tab').forEach((t) => {
      const active = t.dataset.section === key;
      t.classList.toggle('active', active);
      if (active) t.setAttribute('aria-current', 'page');
      else t.removeAttribute('aria-current');
    });
    $('section-title').textContent = SECTION_META[key].title;
    $('section-description').textContent = SECTION_META[key].description;
    document.title = `TRODDR Admin · ${SECTION_META[key].title}`;
    const route = '#/' + key;
    if (!options.fromRoute && location.hash !== route) history.pushState({ section: key }, '', route);
    if (options.fromRoute && location.hash !== route) history.replaceState({ section: key }, '', route);
    loadSection(key);
    closeDrawer();
  }

  document.querySelectorAll('.section-tab').forEach((t) =>
    t.addEventListener('click', () => showSection(t.dataset.section)));
  window.addEventListener('hashchange', () => showSection(sectionFromRoute(), { fromRoute: true }));

  $('menu-btn').addEventListener('click', () => {
    const open = !$('app-shell').classList.contains('drawer-open');
    $('app-shell').classList.toggle('drawer-open', open);
    $('menu-btn').setAttribute('aria-expanded', String(open));
  });
  $('drawer-backdrop').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
  $('refresh-section').addEventListener('click', () => {
    const frame = frameFor(currentSection);
    if (frame.src) frame.contentWindow.location.reload();
  });

  // Child pages (e.g. Overview's "Open →" shortcuts) request section switches.
  window.addEventListener('message', (e) => {
    if (e.origin !== window.location.origin) return;
    const key = e.data && e.data.troddrAdminNav;
    if (key && SECTIONS.includes(key)) showSection(key);
  });

  /* ── Sign out ─────────────────────────────────────────── */
  $('signout').addEventListener('click', () => {
    try { sessionStorage.removeItem('troddr_admin_token'); } catch (e) {}
    try { localStorage.removeItem('troddr_admin_token'); } catch (e) {}
    adminToken = '';
    // Reset every iframe so a fresh sign-in re-authenticates cleanly.
    SECTIONS.forEach((k) => {
      const f = frameFor(k);
      f.removeAttribute('src');
      delete f.dataset.loaded;
    });
    $('gate-input').value = '';
    show('gate');
  });

  /* ── Boot ─────────────────────────────────────────────── */
  async function boot() {
    show('loading');
    // Verify the token against an always-deployed admin RPC. (We deliberately do
    // NOT use admin_search_places_for_booking here — that lives in the Phase 2
    // hotel-booking migration and may not be deployed yet; using it would block
    // sign-in entirely. get_admin_review_queue returns null for an invalid token.)
    const { data, error } = await db.rpc('get_admin_review_queue', {
      p_admin_token: adminToken
    });
    if (error || !data) {
      try { sessionStorage.removeItem('troddr_admin_token'); } catch (e) {}
      adminToken = '';
      $('gate-error').classList.add('show');
      show('gate');
      return;
    }
    show('main');
    showSection(sectionFromRoute(), { fromRoute: true });
  }

  $('gate-go').addEventListener('click', () => {
    const t = $('gate-input').value.trim();
    if (!t) return;
    $('gate-error').classList.remove('show');
    setToken(t);
    boot();
  });
  $('gate-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('gate-go').click(); });

  /* ── Bootstrap ────────────────────────────────────────── */
  const stored = loadStoredToken();
  if (stored) {
    adminToken = stored;
    boot();
  } else {
    show('gate');
  }
</script>

</body>
</html>
