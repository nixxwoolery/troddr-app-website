<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRODDR · Floor Plan Editor</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/partner-shared.css">
<link rel="stylesheet" href="/css/floorplan-builder.css?v=17">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
<script src="/js/troddr-config.js"></script>
<script src="/js/partner-errors.js"></script>
<script src="/js/floorplan-builder.js?v=17"></script>

<script>
  const SUPABASE_URL  = (window.__ENV__ && window.__ENV__.SUPABASE_URL)  || (window.location.origin + '/api/sb');
  const SUPABASE_ANON = (window.__ENV__ && window.__ENV__.SUPABASE_ANON) || '';
</script>

<style>
  :root {
    --blue:#0077CC; --black:#111111; --grey-dark:#333; --grey-mid:#666; --grey-light:#999;
    --border:#e8e8e8; --border-soft:#f0f0f0; --bg:#fff; --bg-soft:#f8f9fa;
    --radius-lg:16px; --red:#c0392b; --green:#1a7f4e; --amber:#b86e00;
    --brand-primary:#0a7aff; --brand-text:#fff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-soft); color: var(--black);
    font-size: 15px; line-height: 1.55;
    min-height: 100vh;
  }
  header {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
  }
  header .logo {
    font-size: 24px; font-weight: 700; color: var(--brand-primary);
    text-decoration: none; letter-spacing: -1px;
  }
  header .badge {
    background: var(--bg-soft); color: var(--grey-dark);
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  }
  header .meta { margin-left: auto; font-size: 12px; color: var(--grey-mid); }

  main { max-width: 1380px; margin: 18px auto; padding: 0 20px 60px; }

  .state-card {
    background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 32px; text-align: center; max-width: 480px; margin: 60px auto;
  }
  .state-card h1 { font-size: 22px; margin-bottom: 8px; }
  .state-card p { color: var(--grey-mid); font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">troddr</a>
  <span class="badge">Designer Mode</span>
  <span class="meta" id="meta">Loading…</span>
</header>

<main>
  <div id="state" class="state-card" style="display:none;">
    <h1 id="state-title">Loading…</h1>
    <p id="state-msg"></p>
  </div>
  <div id="builder-root"></div>
</main>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);
  const $ = (id) => document.getElementById(id);

  // Token comes from /m/<token> rewritten URL or ?token=<token>.
  function getInviteToken() {
    const m = location.pathname.match(/^\/m\/([A-Za-z0-9]+)/);
    if (m) return m[1];
    return new URLSearchParams(location.search).get('token') || '';
  }
  function showState(title, msg) {
    $('state').style.display = '';
    $('builder-root').innerHTML = '';
    $('state-title').textContent = title;
    $('state-msg').textContent = msg || '';
  }

  async function init() {
    const inviteToken = getInviteToken();
    if (!inviteToken) { showState("No invite token", "Open the link from your dashboard email."); return; }

    let res;
    try {
      res = await db.rpc('resolve_event_map_invite', { p_invite_token: inviteToken });
    } catch (e) {
      showState("Couldn't reach the server", (e && e.message) || ''); return;
    }
    const data = res && res.data;
    const err  = res && res.error;
    if (err || !data || !data.ok) {
      const reason = (data && data.error) || (err && err.message) || 'invalid';
      if (reason === 'expired')   return showState("This link has expired",  "Ask the event organiser for a fresh invite.");
      if (reason === 'revoked')   return showState("This link was revoked",  "Ask the event organiser for a fresh invite.");
      if (reason === 'not_found') return showState("Invite not found",       "Double-check the URL.");
      return showState("We couldn't open this editor", reason);
    }

    const ev = data.event;
    $('meta').textContent = `${ev.title || 'Floor Plan'} · expires ${new Date(data.expires_at).toLocaleDateString()}`;

    // The invite scope only covers markers, so the designer gets the full
    // builder but no background upload; layout elements all live in markers.
    FloorplanBuilder.mount({
      container: $('builder-root'),
      draftKey: `troddr-floorplan-invite-draft:${inviteToken}`,
      elements: Array.isArray(ev.floor_plan_markers) ? ev.floor_plan_markers : [],
      backgroundUrl: ev.floor_plan_url || null,
      vendors: Array.isArray(data.vendors) ? data.vendors : [],
      saveLabel: 'Submit changes',
      onSave: async ({ elements }) => {
        const { data: saveData, error } = await db.rpc('update_event_floor_plan_via_invite', {
          p_invite_token: inviteToken,
          p_floor_plan_markers: elements,
        });
        if (error || !saveData || !saveData.ok) {
          return { ok: false, error: (error && error.message) || (saveData && saveData.error) || 'Save failed.' };
        }
        const verify = await db.rpc('resolve_event_map_invite', { p_invite_token: inviteToken });
        const saved = verify && verify.data && verify.data.event && verify.data.event.floor_plan_markers;
        if (verify.error || !Array.isArray(saved) || saved.length !== elements.length) {
          return { ok: false, error: 'The server did not return the complete saved map. Your browser draft has been kept—please submit again.' };
        }
        return { ok: true };
      },
    });
  }

  init();
</script>
</body>
</html>
